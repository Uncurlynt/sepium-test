<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Список товаров</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />.
    <link rel="stylesheet" href="./css/styles.css" />
</head>

<body class="page-body">
<div class="catalog-wrapper">
    <section class="catalog" aria-label="Список товаров">

        <article class="product-unit" data-href="/card">
            <div class="product-unit__top">
                <div class="swiper product-unit__carousel">
                    <div class="swiper-wrapper">
                        <div class="swiper-slide product-unit__slide">
                            <img
                                    src="https://images.pexels.com/photos/7166627/pexels-photo-7166627.jpeg"
                                    alt="Изображение 1"
                                    class="product-unit__img"
                                    loading="lazy"
                            />
                        </div>

                        <div class="swiper-slide product-unit__slide">
                            <img
                                    src="https://images.pexels.com/photos/7166645/pexels-photo-7166645.jpeg"
                                    alt="Изображение 2"
                                    class="product-unit__img"
                                    loading="lazy"
                            />
                        </div>

                        <div class="swiper-slide product-unit__slide">
                            <img
                                    src="https://images.pexels.com/photos/7147290/pexels-photo-7147290.jpeg"
                                    alt="Изображение 3"
                                    class="product-unit__img"
                                    loading="lazy"
                            />
                        </div>
                    </div>
                </div>

                <div class="product-unit__controls">
                    <button class="product-unit__arrow product-unit__arrow--prev" type="button" aria-label="Назад">
                        <svg class="ui-icon" aria-hidden="true">
                            <use href="./assets/sprite.svg#icon-left"></use>
                        </svg>
                    </button>

                    <button class="product-unit__arrow product-unit__arrow--next" type="button" aria-label="Вперёд">
                        <svg class="ui-icon" aria-hidden="true">
                            <use href="./assets/sprite.svg#icon-right"></use>
                        </svg>
                    </button>
                </div>

                <button class="product-unit__zoom-btn" type="button" aria-label="Открыть фото">
                    <svg class="ui-icon" aria-hidden="true">
                        <use href="./assets/sprite.svg#icon-expand"></use>
                    </svg>
                </button>

                <div class="product-unit__hover-desc" aria-hidden="true">
                    <p>Описание товара</p>
                </div>
            </div>

            <div class="product-unit__bottom">
                <div class="product-unit__dots swiper-pagination" aria-label="Пагинация слайдера"></div>

                <header class="product-unit__header">
                    <div class="product-unit__sku">Артикул — 4607</div>
                    <h2 class="product-unit__title" title="Название товара">
                        Угловая бежевая кухня на заказ с матовыми фасадами в современном стиле «Нарцисс»
                    </h2>
                </header>

                <div class="product-unit__materials" aria-label="Материалы">
                    <span class="product-unit__materials-label">Варианты материалов</span>

                    <ul class="product-unit__tags">
                        <li>
                            <button class="product-unit__tag is-active" type="button" aria-pressed="true">
                  <span class="product-unit__tag-checkwrap" aria-hidden="true">
                    <svg class="ui-icon" aria-hidden="true">
                      <use href="./assets/sprite.svg#icon-check"></use>
                    </svg>
                  </span>
                                ПВХ
                            </button>
                        </li>

                        <li>
                            <button class="product-unit__tag" type="button" aria-pressed="false">
                  <span class="product-unit__tag-checkwrap" aria-hidden="true">
                    <svg class="ui-icon" aria-hidden="true">
                      <use href="./assets/sprite.svg#icon-check"></use>
                    </svg>
                  </span>
                                Эмаль
                            </button>
                        </li>

                        <li>
                            <button class="product-unit__tag" type="button" aria-pressed="false">
                  <span class="product-unit__tag-checkwrap" aria-hidden="true">
                    <svg class="ui-icon" aria-hidden="true">
                      <use href="./assets/sprite.svg#icon-check"></use>
                    </svg>
                  </span>
                                Пластик
                            </button>
                        </li>

                        <li>
                            <button class="product-unit__tag" type="button" aria-pressed="false">
                  <span class="product-unit__tag-checkwrap" aria-hidden="true">
                    <svg class="ui-icon" aria-hidden="true">
                      <use href="./assets/sprite.svg#icon-check"></use>
                    </svg>
                  </span>
                                Массив
                            </button>
                        </li>
                    </ul>
                </div>

                <div class="product-unit__action-row">
                    <div class="product-unit__cost-info">
                        <span class="product-unit__cost-prefix">Цена от</span>
                        <strong class="product-unit__cost-main">515 700 ₽</strong>
                        <span class="product-unit__cost-sub">Погонный метр от — <b>30 000 ₽</b></span>
                    </div>

                    <button class="product-unit__btn-buy" type="button">Заказать</button>
                </div>

                <hr class="product-unit__separator" />

                <footer class="product-unit__footer">
                    <button class="product-unit__favorite" type="button" aria-label="Добавить в избранное" aria-pressed="false">
                        <svg class="ui-icon product-unit__favorite-icon" aria-hidden="true">
                            <use href="./assets/sprite.svg#icon-heart"></use>
                        </svg>
                        <span class="product-unit__favorite-counter">57</span>
                    </button>

                    <a href="/calc" target="_blank" rel="noopener noreferrer" class="product-unit__link-calc">
                        Рассчитать стоимость
                        <svg class="ui-icon product-unit__link-icon" aria-hidden="true">
                            <use href="./assets/sprite.svg#icon-chevron"></use>
                        </svg>
                    </a>
                </footer>
            </div>
        </article>

    </section>
</div>

<script src="./js/main.js"></script>
</body>
</html>
