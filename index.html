<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Список товаров</title>

    <link rel="stylesheet" href="./css/styles.css" />
</head>

<body class="page-body">
<div class="catalog-wrapper">
    <section class="catalog" aria-label="Список товаров">
        <article class="product-unit" tabindex="0">
            <div class="product-unit__top">
                <img
                        src="https://images.pexels.com/photos/7166627/pexels-photo-7166627.jpeg"
                        alt="Изображение 1 "
                        class="product-unit__img"
                        loading="lazy"
                />
            </div>

            <div class="product-unit__bottom">
                <div class="product-unit__sku">Артикул — 4607</div>
                <h2 class="product-unit__title">
                    Угловая бежевая кухня на заказ с матовыми фасадами в современном стиле «Нарцисс»
                </h2>
            </div>
        </article>
    </section>
</div>

<script src="./js/main.js"></script>
</body>
</html>
